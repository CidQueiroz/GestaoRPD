services:
  backend:
    build:
      context: ./backend
    container_name: gestaorpd_backend
    # Em dev usamos runserver, em prod o comando é sobrescrito
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend:
    image: node:20-slim
    container_name: gestaorpd_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - NODE_AUTH_TOKEN=${NODE_AUTH_TOKEN}
    command: sh -c "npm config set //npm.pkg.github.com/:_authToken $${NODE_AUTH_TOKEN} && npm install && npm run dev -- --host"
    depends_on:
      - backend
